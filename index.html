// ── Helpers (LOCAL date — no UTC conversion) ──────────────
const fmt=d=>{
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const dy=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+dy;
};
const todayStr=()=>fmt(new Date());

function dayIdx(planStart,ds){
  const s=new Date(planStart+"T12:00:00"),c=new Date(ds+"T12:00:00");
  return(((Math.floor((c-s)/864e5))%7)+7)%7;
}
function weekNum(planStart,ds){
  const s=new Date(planStart+"T12:00:00"),c=new Date(ds+"T12:00:00");
  return Math.floor(Math.max(0,Math.floor((c-s)/864e5))/7)+1;
}
function getPhase(wk){return wk<=4?1:wk<=8?2:3;}
function last7(){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return fmt(d);});}
function calDays(y,m){const days=[];for(let d=new Date(y,m,1);d.getMonth()===m;d.setDate(d.getDate()+1))days.push(fmt(new Date(d)));return days;}
function isVitDDay(planStart,ds){
  if(ds<planStart)return false;
  const s=new Date(planStart+"T12:00:00"),c=new Date(ds+"T12:00:00");
  return Math.floor((c-s)/864e5)%2===0;
}
function getActiveSuppls(planStart,ds){return SUPPLS.filter(s=>!s.every2days||isVitDDay(planStart,ds));}
function getAllChecks(planStart,ds){
  const di=dayIdx(planStart,ds),ph=getPhase(weekNum(planStart,ds));
  const dp=PPL[di];
  const sc=getActiveSuppls(planStart,ds).map(s=>({id:"supp_"+s.id}));
  const waterChecks=Array.from({length:WATER_GOAL},(_,i)=>({id:"w"+i}));
  if(dp.type==="rest")return[...HABITS,...sc,...REST_ACT,...waterChecks];
  const exArr=(EX[dp.type]?.[ph]||[]).map((_,i)=>({id:"ex_"+i}));
  return[...HABITS,...sc,...exArr,...waterChecks];
}

function fmtDisplay(ds){
  const d=new Date(ds+"T12:00:00");
  return d.toLocaleDateString("ar-EG",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
function fmtDisplayEn(ds){
  const d=new Date(ds+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}

              h("p",{style:{fontSize:14,fontWeight:500,color:"#60a5fa"}},fmtDisplay(planStart))
            ),
            h("button",{
              onClick:()=>setShowChangeDateModal(true),
              style:{padding:"7px 12px",borderRadius:8,border:`0.5px solid ${BD}`,background:S2,color:T2,fontSize:12,cursor:"pointer"}
            },"تغيير")
          )
        );
      })(),

      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}},
        h("button",{onClick:()=>{if(calM===0){setCalM(11);setCalY(y=>y-1);}else setCalM(m=>m-1);},style:{background:S1,border:`0.5px solid ${BD}`,color:T1,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:16}},"‹"),
        h("p",{style:{fontSize:15,fontWeight:500,color:T1}},MN[calM]+" "+calY),
        h("button",{onClick:()=>{if(calM===11){setCalM(0);setCalY(y=>y+1);}else setCalM(m=>m+1);},style:{background:S1,border:`0.5px solid ${BD}`,color:T1,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:16}},"›")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:"1rem"}},
        [{lbl:"التقييم",val:ms.grade,color:gradeColor[ms.grade]||T1},{lbl:"متوسط",val:ms.avg+"%",color:"#60a5fa"},{lbl:"مثالي",val:ms.perfect+"d",color:"#4ade80"},{lbl:"نشط",val:ms.active+"d",color:"#fb923c"}]
        .map(({lbl,val,color})=>h("div",{key:lbl,style:{background:S1,borderRadius:10,padding:"8px 6px",textAlign:"center"}},h("p",{style:{fontSize:10,color:T3,marginBottom:3,textTransform:"uppercase",letterSpacing:".04em"}},lbl),h("p",{style:{fontSize:20,fontWeight:600,color}},val)))
      ),
      h("div",{style:{background:S1,borderRadius:14,padding:"1rem",border:`0.5px solid ${BD}`}},
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:8}},["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>h("p",{key:d,style:{fontSize:10,color:T3,textAlign:"center",fontWeight:600}},d))),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
          [...Array(firstDow).fill(null).map((_,i)=>h("div",{key:"e"+i})),
           ...cDays.map(ds=>{
             const{pct:p}=completion(ds);
             const isFuture=ds>today,isTd=ds===today,isB=ds<planStart;
             const hasAny=Object.values(getRec(ds)).some(Boolean);
             const ddi=dayIdx(planStart,ds),ddp=PPL[ddi];
             let bg2=S2;
             if(!isFuture&&!isB&&hasAny)bg2=p>=80?"#0a1f0a":p>=50?"#1e0e00":"#0d1e35";
             return h("div",{key:ds,onClick:()=>{setSel(ds);setTab("today");},style:{aspectRatio:"1",borderRadius:8,background:bg2,border:isTd?`1.5px solid ${ddp.color}`:`0.5px solid ${BD}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:(isFuture||isB)?.4:1}},
               h("p",{style:{fontSize:12,color:(isFuture||isB)?"#444":T1,fontWeight:isTd?600:400}},new Date(ds+"T12:00:00").getDate()),
               !isFuture&&!isB&&hasAny&&h("p",{style:{fontSize:7,color:ddp.color,marginTop:1}},p+"%")
             );
           })]
        ),
        h("div",{style:{display:"flex",gap:10,marginTop:12,justifyContent:"center",flexWrap:"wrap"}},
          [["#0a1f0a","80–100%"],["#1e0e00","50–79%"],["#0d1e35","1–49%"]].map(([bg2,lbl])=>h("div",{key:lbl,style:{display:"flex",alignItems:"center",gap:4}},h("div",{style:{width:10,height:10,borderRadius:3,background:bg2,border:`0.5px solid ${BD}`}}),h("p",{style:{fontSize:10,color:T3}},lbl)))
        )
      ),
      ms.total>0&&h("div",{style:{background:"#091509",border:"0.5px solid #4ade8025",borderRadius:12,padding:"1rem",marginTop:10}},
        h("p",{style:{fontSize:13,fontWeight:500,color:"#4ade80",marginBottom:4}},"ملخص "+MN[calM]),
        h("p",{style:{fontSize:13,color:T2,lineHeight:1.6}},ms.perfect+" يوم مثالي، "+ms.active+" يوم نشط. متوسط "+ms.avg+"% — تقييم "+ms.grade+". "+(ms.avg>=80?"استمر، الثبات هو المفتاح.":ms.avg>=60?"مجهود كويس — ادفع للـ 80%.":"كل يوم بيفرق."))
      )
    ),

    // ══ DIET ═══════════════════════════════════════════════
    tab==="diet"&&h("div",{style:{padding:"1rem"}},
      h("div",{style:{background:"#0a1525",border:"0.5px solid #60a5fa20",borderRadius:12,padding:"10px 14px",marginBottom:"1rem"}},
        h("p",{style:{fontSize:12,color:"#60a5fa",marginBottom:3,fontWeight:600}},"إجمالي السعرات: ~1,340 kcal · عجز ~500 kcal"),
        h("p",{style:{fontSize:11,color:T3}},"بروتين: ~99g · كربو: ~128g · دهون: ~36g")
      ),
      DIET.map(meal=>h("div",{key:meal.title,style:{...card,marginBottom:16}},
        h("div",{style:{padding:"12px 14px",borderBottom:`0.5px solid ${BD}`,background:S2}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
            h("div",{},h("p",{style:{fontSize:15,fontWeight:600,color:T1}},meal.title),h("p",{style:{fontSize:12,color:"#60a5fa",marginTop:2}},meal.titleEn+" · "+meal.time)),
            h("span",{style:{fontSize:12,color:"#fb923c",background:"#1e0e00",padding:"4px 10px",borderRadius:99,flexShrink:0,fontWeight:600}},meal.totalKcal+" kcal")
          ),
          h("div",{style:{display:"flex",gap:12}},
            [{lbl:"بروتين",val:meal.macros.p+"g",color:"#60a5fa"},{lbl:"كربو",val:meal.macros.c+"g",color:"#fb923c"},{lbl:"دهون",val:meal.macros.f+"g",color:"#c084fc"}]
            .map(({lbl,val,color})=>h("div",{key:lbl,style:{background:color+"15",borderRadius:6,padding:"3px 8px",display:"flex",gap:4,alignItems:"center"}},h("p",{style:{fontSize:11,color:T3}},lbl),h("p",{style:{fontSize:11,color,fontWeight:600}},val)))
          )
        ),
        ...meal.items.map((item,i)=>h("div",{key:i,style:{padding:"10px 14px",borderBottom:i<meal.items.length-1?`0.5px solid ${BD}`:"none"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}},h("p",{style:{fontSize:14,color:T1,flex:1,marginRight:8}},item.name),h("span",{style:{fontSize:11,color:"#fb923c",flexShrink:0,background:"#1e0e0070",padding:"1px 6px",borderRadius:4}},item.kcal+" kcal")),
          h("div",{style:{display:"flex",gap:8,marginBottom:4}},
            [{lbl:"P",val:item.p,color:"#60a5fa"},{lbl:"C",val:item.c,color:"#fb923c"},{lbl:"F",val:item.f,color:"#c084fc"}]
            .map(({lbl,val,color})=>h("span",{key:lbl,style:{fontSize:10,color:T3}},h("span",{style:{color,fontWeight:600}},lbl+":"+val+"g")," "))
          ),
          h("p",{style:{fontSize:11,color:T3,lineHeight:1.4,marginBottom:3}},item.note),
          h("p",{style:{fontSize:11,color:"#4ade80",lineHeight:1.4}},item.alt)
        ))
      )),
      h("p",{style:{fontSize:11,fontWeight:600,color:T3,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8,marginTop:"1.25rem"}},"تجنّب → بديل مصري"),
      h("div",{style:card},SWAPS.map(([avoid,swap],i)=>h("div",{key:i,style:{padding:"10px 14px",borderBottom:i<SWAPS.length-1?`0.5px solid ${BD}`:"none"}},h("p",{style:{fontSize:12,color:"#f87171",textDecoration:"line-through",marginBottom:3}},"✗  "+avoid),h("p",{style:{fontSize:13,color:"#4ade80"}},"→  "+swap))))
    ),

    // ══ PLAN ═══════════════════════════════════════════════
    tab==="plan"&&h("div",{style:{padding:"1rem"}},
      h("div",{style:{background:"#0d1e35",borderRadius:12,padding:"12px 14px",marginBottom:"1rem",border:"0.5px solid #60a5fa25"}},
        h("p",{style:{fontSize:11,color:T3,marginBottom:4}},"بداية الخطة"),
        h("p",{style:{fontSize:14,fontWeight:500,color:"#60a5fa"}},fmtDisplay(planStart)),
        h("p",{style:{fontSize:12,color:T3,marginTop:2}},fmtDisplayEn(planStart)+" — Day 1: Push")
      ),
      h("p",{style:{fontSize:11,fontWeight:600,color:T3,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}},"مراحل البرنامج — 12 أسبوع"),
      [[1,"Foundation","Weeks 1–4","#60a5fa","#0d1e35","3–4 sets · 10–12 reps · تعلّم الحركات، ثبّت الفورم، ابني العادة."],
       [2,"Hypertrophy","Weeks 5–8","#fb923c","#1e0e00","4 sets · 8–12 reps + drop sets. حجم أعلى لأقصى ضخامة."],
       [3,"Strength","Weeks 9–12","#c084fc","#1a0a2e","5×5 compounds + accessories. قوة حقيقية كأساس للدورة الجاية."],
      ].map(([p2,name,wks,color,dim,desc])=>h("div",{key:p2,style:{background:dim,border:`0.5px solid ${color}25`,borderRadius:12,padding:"12px 14px",marginBottom:10}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
          h("div",{},h("p",{style:{fontSize:13,fontWeight:500,color}},`Phase ${p2} — ${name}`),h("p",{style:{fontSize:11,color:color,opacity:.6,marginTop:2}},wks)),
          p2===ph&&h("span",{style:{fontSize:11,color,background:color+"20",padding:"2px 8px",borderRadius:99}},"← current")
        ),
        h("p",{style:{fontSize:13,color:T2,lineHeight:1.5}},desc)
      )),
      h("p",{style:{fontSize:11,fontWeight:600,color:T3,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8,marginTop:"1.25rem"}},"PPL cycle — Phase "+ph+": "+phName),
      PPL.map((dp2,i)=>{
        const exArr=dp2.type!=="rest"?(EX[dp2.type]?.[ph]||[]):[];
        const Ic=ILLUS_MAP[dp2.type]||IllusRest;
        return h("div",{key:i,style:{...card,marginBottom:10}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:exArr.length?`0.5px solid ${BD}`:"none",background:dp2.dim}},
            h("div",{style:{flexShrink:0}},h(Ic,{color:dp2.color,size:32})),
            h("p",{style:{fontSize:14,fontWeight:500,color:dp2.color}},`Day ${i+1} — ${dp2.label}`),
            h("span",{style:{marginLeft:"auto",fontSize:11,color:dp2.color,background:dp2.color+"20",padding:"2px 8px",borderRadius:99}},dp2.type)
          ),
          exArr.length>0?exArr.map((ex,ei)=>h("p",{key:ei,style:{fontSize:13,color:T2,padding:"7px 14px",borderBottom:ei<exArr.length-1?`0.5px solid ${BD}`:"none"}},ex)):h("p",{style:{fontSize:13,color:T3,padding:"10px 14px"}},"مشي · إطالة · foam roll · راحة")
        );
      })
    ),

    // ══ SUPPLEMENTS ════════════════════════════════════════
    tab==="suppl"&&h("div",{style:{padding:"1rem"}},
      SUPPL_DATA.map(s=>h("div",{key:s.name,style:{background:S1,border:`0.5px solid ${BD}`,borderRadius:14,padding:"1rem",marginBottom:12}},
        h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:10}},
          h("div",{style:{width:44,height:44,borderRadius:12,background:s.dim||"#111",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},h("div",{style:{width:22,height:22,borderRadius:"50%",background:s.color,opacity:.85}})),
          h("div",{},h("p",{style:{fontSize:15,fontWeight:500,color:T1}},s.name),h("p",{style:{fontSize:12,color:s.color}},s.dose))
        ),
        h("div",{style:{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}},h("p",{style:{fontSize:12,color:T3,flexShrink:0}},"⏱"),h("p",{style:{fontSize:13,color:T2}},s.timing)),
        h("div",{style:{background:s.dim||"#111",borderRadius:10,padding:"10px 12px",border:`0.5px solid ${s.color}15`}},h("p",{style:{fontSize:13,color:T2,lineHeight:1.6}},s.why))
      )),
      h("div",{style:{background:"#1a0e00",border:"0.5px solid #fb923c25",borderRadius:12,padding:"1rem"}},h("p",{style:{fontSize:13,color:T2,lineHeight:1.6}},"⚠  المكملات تدعم خطتك لكنها مش بديل عن الأساسيات. استشر دكتورك قبل بدء الكروميوم أو L-Carnitine."))
    )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
</body>
