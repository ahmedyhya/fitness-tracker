const fmt=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dy=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dy;};
const todayStr=()=>fmt(new Date());
const last7=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return fmt(d);});
const calDays=(y,m)=>{const days=[];for(let d=new Date(y,m,1);d.getMonth()===m;d.setDate(d.getDate()+1))days.push(fmt(new Date(d)));return days;};
const dIdx=(ps,ds)=>{const s=new Date(ps+"T12:00:00"),c=new Date(ds+"T12:00:00");return(((Math.floor((c-s)/864e5))%7)+7)%7;};
const wkNum=(ps,ds)=>{const s=new Date(ps+"T12:00:00"),c=new Date(ds+"T12:00:00");return Math.floor(Math.max(0,Math.floor((c-s)/864e5))/7)+1;};
const isDeload=wk=>wk>0&&wk%4===0;
const progPhase=wk=>isDeload(wk)?"D":wk<=4?1:wk<=8?2:3;
const phaseLabel=wk=>isDeload(wk)?"Deload Week":["Foundation","Hypertrophy","Strength"][progPhase(wk)-1];
const isVitD=(ps,ds)=>{if(ds<ps)return false;const s=new Date(ps+"T12:00:00"),c=new Date(ds+"T12:00:00");return Math.floor((c-s)/864e5)%2===0;};
const activeSuppls=(ps,ds)=>SUPPLS.filter(s=>!s.every2days||isVitD(ps,ds));
const fmtAr=ds=>new Date(ds+"T12:00:00").toLocaleDateString("ar-EG",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const fmtEn=ds=>new Date(ds+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});


function findPrevSession(ps,currentDs,dpType,exKey,allLogs){
  const start=new Date(ps+"T12:00:00"),cur=new Date(currentDs+"T12:00:00");
  const diff=Math.floor((cur-start)/864e5);
  for(let i=diff-1;i>=0;i--){
    const d=new Date(start);d.setDate(d.getDate()+i);const ds=fmt(d);
    if(PPL[dIdx(ps,ds)].type===dpType){
      const lg=allLogs[ds]||{};
      return{ds,log:lg[exKey]||null};
    }
  }
  return null;
}
function allChecks(ps,ds,rec={}){
  const di=dIdx(ps,ds),wk=wkNum(ps,ds),ph=progPhase(wk),dp=PPL[di];
  const sc=activeSuppls(ps,ds).map(s=>({id:"s_"+s.id}));
  const wc=Array.from({length:WG},(_,i)=>({id:"w"+i}));
  if(dp.type==="rest")return[...HABITS,...sc,...REST_ACT,...wc];
  const exArr=rec.express?(EXPRESS[dp.type]||[]):(EX[dp.type]?.[ph]||[]);
  const ex=exArr.map((_,i)=>({id:"e"+i}));
  const wu=(WARMUP[dp.type]||[]).map((_,i)=>({id:"wu"+i}));
  const cd=(COOLDOWN[dp.type]||[]).map((_,i)=>({id:"cd"+i}));
  return[...HABITS,...sc,...wu,...ex,...cd,...wc];
}

function calcTDEE(age,wt,ht,sex,act,bf=null){
  let bmr,formula;
  if(bf&&+bf>5&&+bf<60){
    const lbm=wt*(1-(+bf)/100);
    bmr=Math.round(370+21.6*lbm);formula="Katch-McArdle (body fat %)";
  }else{
    bmr=sex==="m"?(10*wt)+(6.25*ht)-(5*age)+5:(10*wt)+(6.25*ht)-(5*age)-161;
    formula="Mifflin-St Jeor";
  }
  const m={sedentary:1.2,light:1.375,moderate:1.55,active:1.725};
  const tdee=Math.round(bmr*(m[act]||1.375));
  return{bmr:Math.round(bmr),tdee,target:tdee-500,protein:Math.round(wt*1.6),formula};
}

function PlateauCheck({records}){
  const wts=[];
  for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=fmt(d);const r=records[ds]||{};if(r.wt)wts.push({ds,w:+r.wt});}
  if(wts.length<7)return h("div",{style:{background:S1,border:"0.5px solid "+BD,borderRadius:14,padding:"1rem",marginBottom:14}},
    h("p",{style:{fontSize:13,fontWeight:600,color:T1,marginBottom:6}},"Plateau monitor"),
    h("p",{style:{fontSize:13,color:T3,lineHeight:1.5}},"Log your body weight daily for at least 7 days to enable plateau detection. Use the body measurements section below.")
  );
  const recent=wts.slice(-7),older=wts.slice(-14,-7);
  const rAvg=recent.reduce((s,x)=>s+x.w,0)/recent.length;
  const oAvg=older.length>0?older.reduce((s,x)=>s+x.w,0)/older.length:rAvg;
  const diff=+(rAvg-oAvg).toFixed(1);
  const stuck=older.length>=3&&Math.abs(diff)<0.3;
  const losing=diff<=-0.3;
  const sc=stuck?"#fb923c":losing?"#4ade80":"#fbbf24";
  const st=stuck?"Plateau detected — take action":losing?"On track — fat loss progressing":"Stable — monitor closely";
  const steps=[
    ["Week 1 of stall","Stay the course — weight fluctuates daily. Check sleep, stress, and water retention first. Don't panic."],
    ["Week 2 of stall","Drop daily calories by 150-200 kcal. Reduce brown rice to 1/2 cup or skip the almonds snack."],
    ["Week 3 of stall","Add 20 min brisk walk 3x/week on top of training. Do NOT cut more calories at this stage."],
    ["Week 4 of stall","Take a 7-day diet break at maintenance (TDEE, zero deficit). This resets leptin and hunger hormones. Fat loss resumes strongly after."],
    ["After diet break","Return to your 500 kcal deficit. Progress typically resumes within the first week back."],
  ];
  return h("div",{style:{background:S1,border:"0.5px solid "+BD,borderRadius:14,padding:"1rem",marginBottom:14}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
      h("div",{},h("p",{style:{fontSize:13,fontWeight:600,color:T1,marginBottom:2}},"Plateau monitor"),h("p",{style:{fontSize:11,color:T3}},"Last 14 days vs week before")),
      h("div",{style:{textAlign:"right"}},
        h("p",{style:{fontSize:13,fontWeight:600,color:sc}},st),
        h("p",{style:{fontSize:12,color:T3,marginTop:2}},(diff>0?"+":"")+diff+"kg change")
      )
    ),
    h("div",{style:{height:4,background:"#fff1",borderRadius:99,overflow:"hidden",marginBottom:12}},
      h("div",{style:{height:"100%",width:Math.min(100,Math.round(Math.abs(diff)*200))+"%",background:sc,borderRadius:99,transition:"width .5s"}})
    ),
    stuck&&h("div",{style:{background:"#1e0e00",border:"0.5px solid #fb923c30",borderRadius:10,padding:"12px"}},
      h("p",{style:{fontSize:12,color:"#fb923c",fontWeight:600,marginBottom:10}},"Plateau protocol — follow steps in order, one week each:"),
      steps.map(([step,action],i)=>h("div",{key:i,style:{display:"flex",gap:8,paddingBottom:i<steps.length-1?10:0,marginBottom:i<steps.length-1?10:0,borderBottom:i<steps.length-1?"0.5px solid #fb923c20":"none"}},
        h("div",{style:{width:20,height:20,borderRadius:"50%",background:"#fb923c20",border:"0.5px solid #fb923c40",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}},h("p",{style:{fontSize:9,color:"#fb923c",fontWeight:700}},(i+1))),
        h("div",{},h("p",{style:{fontSize:12,color:"#fb923c",fontWeight:500,marginBottom:3}},step),h("p",{style:{fontSize:12,color:T2,lineHeight:1.45}},action))
      ))
    ),
    !stuck&&h("div",{style:{background:losing?"#0a1f12":"#1a1200",border:"0.5px solid "+(losing?"#4ade8025":"#fbbf2425"),borderRadius:10,padding:"10px 12px"}},
      h("p",{style:{fontSize:13,color:losing?"#4ade80":"#fbbf24",lineHeight:1.6}},
        losing?"Fat loss is progressing. Keep current calories and training consistent. Reassess if progress stops for 2 consecutive weeks.":"Weight is holding steady. Are you tracking calories accurately? Getting 7+ hours sleep? Managing stress? Give it one more week before adjusting anything."
      )
    )
  );
}
